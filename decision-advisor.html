<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>人生导师召唤术</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --lime:#BFFF00;--black:#000;--white:#fff;--bg:#BFFF00;
  --card:#ffffffaa;--card2:#ffffffcc;
  --border:rgba(0,0,0,0.13);--border2:rgba(0,0,0,0.28);
  --muted:rgba(0,0,0,0.5);--dim:rgba(0,0,0,0.3);--error:#cc2200;
}
html{scroll-behavior:smooth}
body{background:var(--lime);color:#000;font-family:'DM Sans',-apple-system,sans-serif;font-weight:400;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(0,0,0,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,0.04) 1px,transparent 1px);
  background-size:60px 60px}

/* ── WRAP ── */
.wrap{position:relative;z-index:1;max-width:880px;margin:0 auto;padding:0 24px 100px}

/* ── NAV ── */
.nav{background:rgba(191,255,0,0.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1.5px solid var(--border);padding:0 24px;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.1em}
.tabs{display:flex}
.tab-btn{padding:14px 22px 17px;font-size:13px;font-weight:600;letter-spacing:0.04em;
  color:var(--muted);background:transparent;border:none;cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.18s;font-family:'DM Sans',sans-serif}
.tab-btn:hover{color:#000}
.tab-btn.active{color:#000;border-bottom-color:#000}
.tab-content{display:none}.tab-content.active{display:block}

/* ── HERO ── */
.hero{min-height:calc(100vh - 56px);position:relative;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 28px 60px;border-bottom:1.5px solid var(--border);margin-bottom:48px;text-align:center}
.hero-sphere{background:radial-gradient(circle at 32% 28%,#fff 0%,#f0f0f0 10%,#d8d8d8 25%,#b0b0b0 45%,#888 65%,#606060 82%,#404040 100%);
  box-shadow:inset -5px -5px 14px rgba(0,0,0,0.22),inset 4px 4px 10px rgba(255,255,255,0.8),0 12px 40px rgba(0,0,0,0.15);
  border-radius:50%;position:absolute;opacity:0.85}
.hero-cyl{background:linear-gradient(90deg,#ccc 0%,#eee 12%,#fff 28%,#fff 38%,#e8e8e8 48%,#ccc 60%,#aaa 75%,#bbb 100%);
  box-shadow:0 6px 20px rgba(0,0,0,0.13);border-radius:8px;position:absolute;opacity:0.88}
@keyframes floatA{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-18px) rotate(4deg)}}
@keyframes floatB{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-12px) rotate(-6deg)}}
@keyframes floatC{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-22px) rotate(3deg)}}
@keyframes spinStar{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes spinStarRev{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}
.fa{animation:floatA 5s ease-in-out infinite}.fb{animation:floatB 4.2s ease-in-out infinite}.fc{animation:floatC 6.5s ease-in-out infinite}
.ss{animation:spinStar 20s linear infinite}.ssr{animation:spinStarRev 28s linear infinite}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(64px,14vw,152px);
  font-weight:400;letter-spacing:-0.02em;line-height:0.9;color:#000;margin-bottom:20px;position:relative;z-index:10}
.hero p{font-size:16px;color:var(--muted);line-height:1.75;max-width:460px;margin:0 auto 36px;position:relative;z-index:10}
.hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;position:relative;z-index:10}

/* ── BUTTONS ── */
.btn-black{background:#000;color:var(--lime);border:2px solid #000;border-radius:100px;
  font-family:'DM Sans',sans-serif;font-weight:700;cursor:pointer;
  display:inline-flex;align-items:center;gap:8px;
  transition:all 0.25s cubic-bezier(0.23,1,0.32,1);position:relative;overflow:hidden}
.btn-black::before{content:'';position:absolute;inset:0;background:var(--lime);transform:translateX(-101%);transition:transform 0.3s cubic-bezier(0.23,1,0.32,1)}
.btn-black:hover::before{transform:translateX(0)}.btn-black:hover{color:#000}
.btn-black span{position:relative;z-index:1;display:flex;align-items:center;gap:8px}
.btn-black:disabled{opacity:0.35;cursor:not-allowed}
.btn-outline{background:transparent;color:#000;border:2px solid #000;border-radius:100px;
  font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;
  display:inline-flex;align-items:center;gap:8px;
  transition:all 0.25s cubic-bezier(0.23,1,0.32,1);position:relative;overflow:hidden}
.btn-outline::before{content:'';position:absolute;inset:0;background:#000;transform:translateX(-101%);transition:transform 0.3s cubic-bezier(0.23,1,0.32,1)}
.btn-outline:hover::before{transform:translateX(0)}.btn-outline:hover{color:var(--lime)}
.btn-outline span{position:relative;z-index:1}

/* ── SECTION LABEL ── */
.section-label{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--dim);
  margin-bottom:10px;font-weight:600;display:flex;align-items:center;gap:8px}
.section-label::before{content:'';display:block;width:16px;height:1.5px;background:#000;opacity:0.35;flex-shrink:0}

/* ── API NOTICE ── */
.api-notice{background:rgba(200,50,30,0.07);border:1.5px solid rgba(200,50,30,0.2);
  border-radius:14px;padding:16px 18px;font-size:13px;color:rgba(180,40,20,0.9);line-height:1.7;margin-bottom:36px}
.api-notice strong{color:#cc2200}
.api-key-row{display:flex;gap:8px;margin-top:10px}
.api-key-input{flex:1;background:rgba(255,255,255,0.6);border:1.5px solid rgba(200,50,30,0.2);
  border-radius:8px;padding:9px 14px;font-size:13px;font-family:'SF Mono',Menlo,monospace;color:#000;outline:none}
.api-key-input:focus{border-color:rgba(200,50,30,0.5)}
.api-key-btn{padding:9px 16px;background:rgba(200,50,30,0.1);border:1.5px solid rgba(200,50,30,0.25);
  border-radius:8px;color:#cc2200;font-size:13px;cursor:pointer;font-weight:600}

/* ── QUESTION ── */
.question-section{margin-bottom:40px}
.question-guide{background:var(--card2);border:1.5px solid var(--border);border-radius:18px;overflow:hidden;backdrop-filter:blur(8px)}
.guide-header{display:flex;align-items:center;justify-content:space-between;
  padding:13px 20px 11px;border-bottom:1.5px solid var(--border);background:rgba(0,0,0,0.04)}
.guide-title{font-size:12px;font-weight:700;color:#000;letter-spacing:0.06em}
.guide-toggle{font-size:11px;color:var(--dim);cursor:pointer;border:1.5px solid var(--border);
  border-radius:100px;padding:3px 11px;background:transparent;transition:all 0.15s;font-weight:500}
.guide-toggle:hover{color:#000;border-color:var(--border2)}
.guide-hints{display:grid;grid-template-columns:1fr 1fr;border-bottom:1.5px solid var(--border)}
.guide-hint{padding:11px 20px;border-right:1.5px solid var(--border);cursor:pointer;transition:background 0.15s}
.guide-hint:nth-child(even){border-right:none}.guide-hint:nth-child(n+3){border-top:1.5px solid var(--border)}
.guide-hint:hover{background:rgba(0,0,0,0.05)}
.guide-hint-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#000;margin-bottom:3px;font-weight:700}
.guide-hint-text{font-size:12px;color:var(--muted);line-height:1.5}
.guide-textarea-wrap textarea{width:100%;min-height:150px;background:transparent;border:none;
  border-bottom:1.5px solid var(--border);padding:18px 20px;font-size:14px;color:#000;
  line-height:1.85;resize:vertical;outline:none;font-family:'DM Sans',-apple-system,sans-serif}
.guide-textarea-wrap textarea::placeholder{color:var(--dim);font-style:italic}
.guide-structure{display:flex;gap:0;padding:10px 20px;align-items:center;background:rgba(0,0,0,0.03)}
.guide-struct-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--dim);
  padding-right:14px;margin-right:14px;border-right:1.5px solid var(--border);font-weight:500}
.guide-struct-item:last-child{border-right:none;padding-right:0;margin-right:0}
.guide-struct-dot{width:4px;height:4px;border-radius:50%;background:#000;opacity:0.4;flex-shrink:0}
.char-count{font-size:11px;color:var(--dim);margin-left:auto}

/* ── ADVISORS ── */
.advisors-section{margin-bottom:32px}
.advisors-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:10px}
.advisor-card{border:1.5px solid var(--border);border-radius:16px;padding:16px 16px 12px;cursor:pointer;
  background:var(--card);backdrop-filter:blur(8px);transition:all 0.2s cubic-bezier(0.23,1,0.32,1);position:relative;overflow:hidden}
.advisor-card:hover{border-color:var(--border2);transform:translateY(-2px);background:var(--card2);box-shadow:0 6px 20px rgba(0,0,0,0.1)}
.advisor-card.selected{border-color:#000;background:#000}
.advisor-card.selected .adv-name{color:var(--lime)}
.advisor-card.selected .adv-tag{color:rgba(191,255,0,0.5)}
.advisor-card.selected .adv-glyph{border-color:rgba(191,255,0,0.25);background:rgba(191,255,0,0.1)}
.advisor-card.selected .adv-glyph svg{stroke:var(--lime)}
.advisor-card.selected .check-ring{background:var(--lime);border-color:var(--lime);color:#000}
.advisor-card.selected .bio-btn{border-color:rgba(191,255,0,0.25);color:rgba(191,255,0,0.6)}
.advisor-card.selected .bio-btn:hover{border-color:var(--lime);color:var(--lime)}
.check-ring{position:absolute;top:12px;right:12px;width:16px;height:16px;border-radius:50%;
  border:1.5px solid var(--dim);display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;font-size:9px;font-weight:800}
.adv-glyph{width:30px;height:30px;border-radius:8px;background:rgba(0,0,0,0.07);
  border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;margin-bottom:10px;flex-shrink:0}
.adv-glyph svg{width:14px;height:14px;stroke:#000;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.adv-name{font-size:13px;font-weight:700;color:#000;margin-bottom:4px;letter-spacing:-0.01em}
.adv-tag{font-size:10px;color:var(--muted);line-height:1.5;margin-bottom:8px}
.bio-btn{width:100%;padding:5px 0;background:transparent;border:1.5px solid var(--border);
  border-radius:100px;font-size:10px;font-weight:700;color:var(--muted);cursor:pointer;
  transition:all 0.15s;letter-spacing:0.06em;font-family:'DM Sans',sans-serif}
.bio-btn:hover{border-color:var(--border2);color:#000}

/* ── SUBMIT ── */
.submit-row{display:flex;gap:10px;align-items:center;margin-bottom:40px}
.ask-btn{flex:1;padding:14px 20px;font-size:14px;font-weight:700;letter-spacing:0.02em}
.select-all-btn{padding:14px 18px;background:transparent;color:var(--muted);border:1.5px solid var(--border);
  border-radius:100px;font-size:13px;cursor:pointer;transition:all 0.15s;white-space:nowrap;font-weight:500}
.select-all-btn:hover{border-color:var(--border2);color:#000}

/* ── RESULTS ── */
.results{display:flex;flex-direction:column;gap:14px}
.result-card{background:var(--card2);border:1.5px solid var(--border);border-radius:18px;padding:22px 24px;
  animation:fadeUp 0.4s ease forwards;opacity:0;backdrop-filter:blur(8px)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.result-header{display:flex;align-items:flex-start;gap:14px;
  margin-bottom:16px;padding-bottom:16px;border-bottom:1.5px solid var(--border)}
.result-glyph{width:36px;height:36px;border-radius:10px;background:rgba(0,0,0,0.07);
  border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.result-glyph svg{width:16px;height:16px;stroke:#000;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.result-header-info{flex:1}
.result-name{font-size:15px;font-weight:700;color:#000;letter-spacing:-0.01em}
.result-method{font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:0.02em}
.result-bio-btn{padding:5px 12px;background:transparent;border:1.5px solid var(--border);
  border-radius:100px;font-size:10px;font-weight:700;color:var(--muted);cursor:pointer;
  transition:all 0.15s;white-space:nowrap;flex-shrink:0;letter-spacing:0.06em;margin-top:2px}
.result-bio-btn:hover{border-color:var(--border2);color:#000}
.result-body{font-size:14px;color:#000;line-height:1.95;white-space:pre-wrap}

/* ── LOADING ── */
.loading-wave{display:flex;gap:5px;align-items:center;padding:4px 0}
.loading-wave span{display:block;width:4px;height:4px;border-radius:50%;background:#000;animation:wave 1.2s ease-in-out infinite}
.loading-wave span:nth-child(2){animation-delay:0.15s}.loading-wave span:nth-child(3){animation-delay:0.3s}
@keyframes wave{0%,60%,100%{transform:translateY(0);opacity:0.25}30%{transform:translateY(-5px);opacity:1}}

/* ── SYNTHESIS ── */
.synthesis-section{margin-top:16px;background:rgba(0,0,0,0.06);border:1.5px solid var(--border);border-radius:18px;padding:22px 24px}
.synthesis-section h3{font-size:12px;font-weight:700;color:#000;margin-bottom:8px;letter-spacing:0.08em;text-transform:uppercase}
.synthesis-section p{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.7}
.synth-btn{padding:9px 22px;background:transparent;border:1.5px solid var(--border2);border-radius:10px;
  color:#000;font-size:13px;cursor:pointer;transition:all 0.15s;font-weight:600}
.synth-btn:hover{background:#000;color:var(--lime)}
.synth-result{margin-top:16px;font-size:14px;line-height:1.9;color:#000;white-space:pre-wrap}

/* ── FOLLOWUP ── */
.followup-area{margin-top:18px;border-top:1.5px solid var(--border);padding-top:16px}
.chat-history{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
.chat-bubble{font-size:13px;line-height:1.8;white-space:pre-wrap}
.chat-bubble.user{color:var(--muted);padding:9px 14px;background:rgba(0,0,0,0.05);border-radius:10px;border-left:2px solid rgba(0,0,0,0.2)}
.chat-bubble.advisor{color:#000;padding:2px 0}
.followup-row{display:flex;gap:8px;align-items:flex-end}
.followup-input{flex:1;background:rgba(255,255,255,0.6);border:1.5px solid var(--border);
  border-radius:10px;padding:9px 14px;font-size:13px;color:#000;resize:none;outline:none;
  line-height:1.6;min-height:38px;max-height:120px;transition:border-color 0.15s;font-family:'DM Sans',sans-serif}
.followup-input:focus{border-color:var(--border2)}
.followup-input::placeholder{color:var(--dim)}
.followup-btn{padding:9px 16px;background:transparent;border:1.5px solid var(--border);border-radius:10px;
  color:#000;font-size:13px;cursor:pointer;transition:all 0.15s;white-space:nowrap;font-weight:600}
.followup-btn:hover{border-color:#000;background:#000;color:var(--lime)}
.followup-btn:disabled{opacity:0.35;cursor:not-allowed}

/* ── SUMMARY TRIGGER ── */
.summary-trigger-btn{padding:13px 30px;background:transparent;border:1.5px solid var(--border2);
  border-radius:12px;color:#000;font-size:14px;cursor:pointer;font-weight:600;transition:all 0.2s;letter-spacing:0.02em}
.summary-trigger-btn:hover{background:#000;color:var(--lime);transform:translateY(-1px)}

/* ── MODALS (shared) ── */
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(6px)}
.modal-panel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:min(680px,92vw);max-height:82vh;
  background:rgba(240,255,100,0.97);border:1.5px solid var(--border2);
  border-radius:22px;display:flex;flex-direction:column;overflow:hidden}
.modal-header{display:flex;align-items:center;justify-content:space-between;
  padding:16px 22px;border-bottom:1.5px solid var(--border);flex-shrink:0;background:rgba(0,0,0,0.05)}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:18px;font-weight:400;color:#000;letter-spacing:0.06em}
.modal-close{padding:5px 10px;background:transparent;border:1.5px solid var(--border2);
  border-radius:8px;color:var(--muted);font-size:13px;cursor:pointer;transition:all 0.15s}
.modal-close:hover{color:#000}
.modal-body{padding:24px;overflow-y:auto;flex:1;font-size:14px;line-height:2;color:#000}

/* BIO body */
.bio-body{white-space:pre-line}
.bio-section{margin-bottom:20px}
.bio-section-head{font-weight:800;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;
  color:#000;margin-bottom:6px;opacity:0.5}
.bio-section-text{font-size:14px;line-height:1.9;color:#000}

/* Summary modal wider */
.summary-panel{width:min(780px,92vw)}
.modal-body h2{font-family:'Bebas Neue',sans-serif;font-size:22px;font-weight:400;color:#000;
  margin:24px 0 12px;padding-bottom:8px;border-bottom:1.5px solid var(--border);letter-spacing:0.04em}
.modal-body h2:first-child{margin-top:0}
.modal-body p{margin:0 0 10px}
.modal-body ul{padding-left:20px;margin:6px 0 12px}.modal-body li{margin-bottom:6px}
.modal-body table{width:100%;border-collapse:collapse;margin:12px 0 20px;font-size:13px}
.modal-body th{background:rgba(0,0,0,0.08);color:#000;padding:9px 12px;text-align:left;font-weight:700;border:1.5px solid var(--border)}
.modal-body td{padding:8px 12px;border:1.5px solid var(--border);vertical-align:top}
.modal-body tr:nth-child(even) td{background:rgba(0,0,0,0.03)}
.modal-body .highlight{background:rgba(0,0,0,0.07);border-left:3px solid #000;padding:12px 16px;border-radius:0 10px 10px 0;margin:12px 0;font-style:italic}
.modal-body .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;margin:0 3px 3px 0}
.modal-body .tag-agree{background:rgba(0,180,100,0.15);color:#006630}
.modal-body .tag-differ{background:rgba(200,50,30,0.12);color:#8b1a0a}
.modal-body .tag-action{background:rgba(0,0,0,0.1);color:#000}
.summary-copy-btn{padding:6px 14px;background:transparent;border:1.5px solid var(--border2);
  border-radius:8px;color:var(--muted);font-size:12px;cursor:pointer;transition:all 0.15s;font-weight:500}
.summary-copy-btn:hover{color:#000;border-color:#000}

/* ── DIVIDER / FOOTER ── */
.divider{height:1.5px;background:var(--border);margin:44px 0}
footer{text-align:center;font-size:11px;color:var(--dim);padding-top:24px;border-top:1.5px solid var(--border);line-height:2.2;letter-spacing:0.06em;font-weight:500}

/* ── PSYCH ── */
.psych-hero{padding:60px 0 44px;border-bottom:1.5px solid var(--border);margin-bottom:44px}
.psych-hero h2{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,6vw,72px);font-weight:400;color:#000;letter-spacing:-0.01em;margin-bottom:10px}
.psych-hero p{font-size:14px;color:var(--muted);line-height:1.75}
.tests-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;margin-bottom:36px}
.test-card{background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:22px;cursor:pointer;
  transition:all 0.2s cubic-bezier(0.23,1,0.32,1);backdrop-filter:blur(8px)}
.test-card:hover{border-color:var(--border2);transform:translateY(-2px);background:var(--card2);box-shadow:0 6px 20px rgba(0,0,0,0.1)}
.test-card.active{border-color:#000;background:#000}
.test-card.active .test-name{color:var(--lime)}.test-card.active .test-desc,.test-card.active .test-meta{color:rgba(191,255,0,0.5)}
.test-card.active .test-card-glyph{background:rgba(191,255,0,0.1);border-color:rgba(191,255,0,0.2)}
.test-card.active .test-card-glyph svg{stroke:var(--lime)}
.test-card-glyph{width:38px;height:38px;border-radius:11px;background:rgba(0,0,0,0.07);border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.test-card-glyph svg{width:17px;height:17px;stroke:#000;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.test-name{font-size:15px;font-weight:700;color:#000;margin-bottom:6px;letter-spacing:-0.01em}
.test-desc{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:12px}
.test-meta{font-size:11px;color:var(--dim);font-weight:500}
.test-area{background:var(--card2);border:1.5px solid var(--border);border-radius:20px;padding:30px;display:none;backdrop-filter:blur(8px)}
.test-area.visible{display:block;animation:fadeUp 0.35s ease}
.test-area-title{font-family:'Bebas Neue',sans-serif;font-size:28px;font-weight:400;color:#000;letter-spacing:0.02em;margin-bottom:6px}
.test-area-sub{font-size:13px;color:var(--muted);margin-bottom:26px;line-height:1.6}
.test-q-label{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--dim);font-weight:700;margin-bottom:10px}
.test-question{font-size:16px;color:#000;font-weight:600;line-height:1.6;margin-bottom:22px;letter-spacing:-0.01em}
.test-progress-bar{height:2px;background:rgba(0,0,0,0.12);border-radius:2px;margin-bottom:28px;overflow:hidden}
.test-progress-fill{height:100%;background:#000;border-radius:2px;transition:width 0.35s ease}
.test-options{display:flex;flex-direction:column;gap:8px;margin-bottom:26px}
.test-option{padding:12px 18px;border:1.5px solid var(--border);border-radius:12px;cursor:pointer;
  font-size:14px;color:#000;background:rgba(255,255,255,0.5);transition:all 0.15s;text-align:left;font-family:'DM Sans',sans-serif}
.test-option:hover{border-color:var(--border2);background:rgba(255,255,255,0.8)}
.test-option.selected{border-color:#000;background:#000;color:var(--lime);font-weight:600}
.test-nav{display:flex;gap:10px;align-items:center}
.test-btn-next{padding:11px 26px;background:#000;color:var(--lime);border:1.5px solid #000;border-radius:10px;
  font-size:14px;font-weight:700;cursor:pointer;transition:all 0.18s;font-family:'DM Sans',sans-serif}
.test-btn-next:hover{background:transparent;color:#000}.test-btn-next:disabled{opacity:0.3;cursor:default}
.test-btn-back{padding:11px 18px;background:transparent;border:1.5px solid var(--border);border-radius:10px;
  font-size:13px;color:var(--muted);cursor:pointer;transition:all 0.15s}
.test-btn-back:hover{color:#000;border-color:var(--border2)}
.test-q-counter{font-size:12px;color:var(--dim);margin-left:auto;font-weight:500}
.test-result{display:none;padding:24px;background:rgba(0,0,0,0.05);border-radius:14px;margin-top:20px;border:1.5px solid var(--border);animation:fadeUp 0.4s ease}
.test-result.visible{display:block}
.test-result-title{font-family:'Bebas Neue',sans-serif;font-size:32px;font-weight:400;color:#000;margin-bottom:8px;letter-spacing:0.02em}
.test-result-body{font-size:14px;color:#000;line-height:1.95;white-space:pre-wrap}
.test-result-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.result-tag{padding:4px 13px;border-radius:100px;font-size:11px;font-weight:700;letter-spacing:0.04em;background:rgba(0,0,0,0.1);color:#000;border:1px solid rgba(0,0,0,0.15)}
.test-restart-btn{margin-top:16px;padding:10px 22px;background:transparent;border:1.5px solid var(--border2);
  border-radius:10px;font-size:13px;color:var(--muted);cursor:pointer;transition:all 0.15s;font-weight:500}
.test-restart-btn:hover{color:#000;border-color:#000}
.ai-analyze-btn{margin-top:12px;margin-left:8px;padding:10px 22px;background:#000;color:var(--lime);
  border:1.5px solid #000;border-radius:10px;font-size:13px;cursor:pointer;transition:all 0.15s;font-weight:600;font-family:'DM Sans',sans-serif}
.ai-analyze-btn:hover{background:transparent;color:#000}
.ai-analysis-result{margin-top:16px;padding:18px;background:rgba(255,255,255,0.5);border-radius:12px;
  border:1.5px solid var(--border);font-size:14px;line-height:1.9;color:#000;display:none}
.ai-analysis-result.visible{display:block;animation:fadeUp 0.35s ease}
</style>
</head>

<script>
const GLYPHS = {
  marx:`<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3"/><path d="M3 21c0-4.4 4-8 9-8s9 3.6 9 8"/><path d="M17 6l2-2M19 10l2 2"/></svg>`,

  nietzsche:`<svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>`,
  buddha:`<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>`,
  sun:`<svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
};
const TEST_GLYPHS = {
  attachment:`<svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`,
  decisionStyle:`<svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>`,

let selected = new Set();

function switchTab(name) {

const ADVISORS = [
  { id:'marx', name:'马克思', tag:'结构分析 · 矛盾 · 杠杆点',
    bio:'我是谁\n我是卡尔·马克思。律师之子，却用一生对抗律师们保护的那个世界。别叫我「思想家」——我是一个诊断师，专门找出让人们明明聪明、却总做出烂决定的那个结构性原因。\n\n我的起点\n特里尔，1818年。我见过莱茵河两岸的农民被封建地主榨干，却还以为自己活该受穷。从那时我就知道：人类最大的悲剧不是苦难本身，而是把结构性的压迫误读成个人的失败。\n\n我的立场\n我的分析框架只有一个核心问题——是什么在再生产这个问题？不是你不够努力，不是你运气差，而是什么结构让这个局面持续下去、对谁有利。找到杠杆点，才有出路。',
    system:`你是一个运用马克思主义方法论的深度结构分析框架。目标不是扮演意识形态学者，而是用结构分析工具帮用户看穿表象、找到真正的杠杆点。核心问题永远是：什么在再生产这个问题？这种再生产为何理性且持久？真正的杠杆点在哪里？\n\n━━ 第一步：问题路由 ━━\n判断问题类型（可多选）：症状问题 / 策略问题 / 叙事问题 / 历史问题 / 系统问题 / 干预问题。如果结构分析贡献有限，直接说明。\n\n━━ 第二步：选择并运行引擎 ━━\n【矛盾分析引擎】核心问：系统内部哪些相互依存的压力在向相反方向拉扯？步骤：①精确命名两股压力 ②说明为何共存 ③识别主要矛盾 ④区分"管理张力"vs"转化张力" ⑤寻找阈值条件\n【整体分析引擎】核心问：什么更宏观的结构使局部行为理性或适得其反？步骤：①行动者地图 ②不对称性 ③反馈环 ④局部理性 ⑤再生产机制\n【历史化引擎】核心问：这个安排如何变成"正常"的？步骤：①去自然化 ②重建起源 ③追踪沉积物 ④路径依赖 ⑤标记偶然性\n【意识形态批判引擎】核心问：哪种框架让现有安排看起来正常？步骤：①命名主导框架 ②分离真实性与功能性 ③问它隐藏什么 ④协调问题 ⑤更好的机制描述\n【实践循环引擎】核心问：什么行动能测试或改变这个诊断？步骤：①最小有意义的干预 ②定义指标 ③预判阻力 ④修正规则 ⑤谨慎扩展\n\n━━ 第三步：与竞争性解释比较 ━━\n━━ 第四步：确定性标注 [确定]/[推断]/[有争议]/[推测] ━━\n━━ 输出格式 ━━ 1.表层现象 2.深层结构 3.主要张力 4.框架批判 5.历史注脚 6.杠杆点 7.行动建议（以"因此，"开头）\n━━ 语言原则 ━━ 平实语言优先。不做道德剧场，分析清醒冷静。`},
  { id:'mao', name:'毛泽东', tag:'矛盾论 · 实践论',
    bio:'我是谁\n我是毛泽东。湖南农民的儿子，读过书，打过仗，执过政。别问我书本上怎么说——我只问你：你调查过没有？没有调查，就没有发言权。\n\n我的起点\n韶山冲，穷苦人家。十几岁就看清楚了一件事：弱者要翻身，靠的不是等待，而是找准主要矛盾，集中力量打击它。其他都是次要的。\n\n我的立场\n任何困局都有主要矛盾和次要矛盾。你现在的问题是——你在跟次要矛盾死磕，主要矛盾却没人碰。矛盾是普遍的，但解决矛盾的方法必须从实际出发。理论联系实际，实践出真知。',
    system:`你是毛泽东。请用矛盾论和实践论的视角分析这个决策。找出这件事的主要矛盾和次要矛盾，强调实践出真知，联系实际，联系群众。语言简洁有力，带有中国智慧和革命气息，120-160字。结尾以"所以，"开头给出明确建议。`},
  { id:'ququ', name:'曲曲大女人', tag:'价值博弈 · 自我价值 · 不将就',
    bio:'我是谁\n我是曲曲。做过咨询，写过教材，见过几百个在烂关系里转圈的女人。别叫我「情感博主」——我是一个清醒的人，专门帮你看清你不敢看清的事。\n\n我的起点\n见过太多所谓「真心付出」最后换来白眼的故事。一升米养恩人，一斗米养仇人。感情不是道德课，是人性博弈。你越不懂人性，越容易成为消耗品。\n\n我的立场\n我只问你一件事——你现在是出于力量在做决定，还是出于恐惧？答案不同，策略完全不同。你以为的付出，可能正在把对方养成你的敌人。越用力过猛，越得不到。得到，恰恰是在无为之中获得的。',

  { id:'buddha', name:'佛陀', tag:'放下执念 · 中道',

const histories = {};


function renderAdvisors() {
  document.getElementById('advisors-grid').innerHTML = ADVISORS.map(a => `
    <div class="advisor-card ${selected.has(a.id)?'selected':''}" onclick="toggle('${a.id}')">
      <div class="check-ring">${selected.has(a.id)?'✓':''}</div>
      <div class="adv-glyph">${GLYPHS[a.id]||''}</div>
      <div class="adv-name">${a.name}</div>
      <div class="adv-tag">${a.tag}</div>
      <button class="bio-btn" onclick="event.stopPropagation();showBio('${a.id}')">身份介绍</button>
    </div>`).join('');
}

function toggle(id){if(selected.has(id))selected.delete(id);else selected.add(id);renderAdvisors();}
function toggleAll(){if(selected.size===ADVISORS.length)selected.clear();else ADVISORS.forEach(a=>selected.add(a.id));renderAdvisors();}

function showBio(id) {
  const adv = ADVISORS.find(a=>a.id===id); if(!adv) return;
  document.getElementById('bio-modal-title').textContent = adv.name + ' · ' + adv.tag;
  const body = document.getElementById('bio-modal-body');
  // Render bio with styled sections
  const parts = adv.bio.split('\n\n');
  body.innerHTML = parts.map(p => {
    const lines = p.split('\n');
    const head = lines[0];
    const rest = lines.slice(1).join('\n');
    return `<div class="bio-section"><div class="bio-section-head">${head}</div><div class="bio-section-text">${rest}</div></div>`;
  }).join('');
  document.getElementById('bio-modal').style.display = 'block';
}
function closeBio(){document.getElementById('bio-modal').style.display='none';}

async function callAdvisor(adv,userMsg,bodyEl,followupArea){
  if(!histories[adv.id])histories[adv.id]=[];
  histories[adv.id].push({role:'user',content:userMsg});
  bodyEl.innerHTML='<div class="loading-wave"><span></span><span></span><span></span></div>';
  try{
    const resp=await fetch('/api/chat',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system:adv.system,messages:histories[adv.id]})});
    const data=await resp.json();
    if(data.error){bodyEl.textContent=`错误：${data.error.message}`;bodyEl.style.color='var(--error)';histories[adv.id].pop();return;}
    const reply=data.content?.[0]?.text||'（获取建议失败）';
    histories[adv.id].push({role:'assistant',content:reply});
    bodyEl.textContent=reply;
    if(followupArea)followupArea.style.display='block';
  }catch(e){bodyEl.textContent='网络错误，请检查 API Key 或网络连接后重试。';bodyEl.style.color='var(--error)';histories[adv.id].pop();}
}

async function askAdvisors(){
  const q=document.getElementById('question').value.trim();
  if(!q){alert('请先描述你的困境');return;}
  if(selected.size===0){alert('请至少选择一位导师');return;}
  const btn=document.getElementById('ask-btn');
  btn.disabled=true;btn.querySelector('span').textContent='导师们正在思考…';
  const results=document.getElementById('results');results.innerHTML='';
  Object.keys(histories).forEach(k=>delete histories[k]);
  document.getElementById('summary-trigger').style.display='none';
  const advisors=ADVISORS.filter(a=>selected.has(a.id));
  for(let i=0;i<advisors.length;i++){
    const adv=advisors[i];
    const card=document.createElement('div');
    card.className='result-card';card.style.animationDelay=(i*0.05)+'s';card.dataset.advisorId=adv.id;
    card.innerHTML=`
      <div class="result-header">
        <div class="result-glyph">${GLYPHS[adv.id]||''}</div>
        <div class="result-header-info">
          <div class="result-name">${adv.name}</div>
          <div class="result-method">${adv.tag}</div>
        </div>
        <button class="result-bio-btn" onclick="showBio('${adv.id}')">身份介绍</button>
      </div>
      <div class="result-body"></div>
      <div class="followup-area" style="display:none;">
        <div class="chat-history" id="history-${adv.id}"></div>
        <div class="followup-row">
          <textarea class="followup-input" id="followup-input-${adv.id}" placeholder="继续追问${adv.name}…" rows="1"
            onkeydown="handleFollowupKey(event,'${adv.id}')"></textarea>
          <button class="followup-btn" id="followup-btn-${adv.id}" onclick="sendFollowup('${adv.id}')">追问</button>
        </div>
      </div>`;
    results.appendChild(card);
    await callAdvisor(adv,`我的决策问题：${q}`,card.querySelector('.result-body'),card.querySelector('.followup-area'));
  }
  btn.disabled=false;
  btn.innerHTML='<span><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>重新召唤</span>';
  showSummaryTrigger();
  if(advisors.length>1){
    const s=document.createElement('div');s.className='synthesis-section';
    s.innerHTML=`<h3>综合裁决</h3><p>让导师们的观点碰撞，提炼出综合性的决策建议</p>
      <button class="synth-btn" onclick="getSynthesis()" id="synth-btn">生成综合建议</button>
      <div class="synth-result" id="synth-result"></div>`;
    results.appendChild(s);
  }
}

function handleFollowupKey(e,id){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendFollowup(id);}}

async function sendFollowup(advisorId){
  const adv=ADVISORS.find(a=>a.id===advisorId);if(!adv)return;
  const inputEl=document.getElementById(`followup-input-${advisorId}`);
  const btn=document.getElementById(`followup-btn-${advisorId}`);
  const historyEl=document.getElementById(`history-${advisorId}`);
  const q=inputEl.value.trim();if(!q)return;
  inputEl.value='';btn.disabled=true;
  const ub=document.createElement('div');ub.className='chat-bubble user';ub.textContent=q;historyEl.appendChild(ub);
  const ab=document.createElement('div');ab.className='chat-bubble advisor';
  ab.innerHTML='<div class="loading-wave"><span></span><span></span><span></span></div>';historyEl.appendChild(ab);
  ab.scrollIntoView({behavior:'smooth',block:'nearest'});
  histories[advisorId].push({role:'user',content:q});
  try{
    const resp=await fetch('/api/chat',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system:adv.system,messages:histories[advisorId]})});
    const data=await resp.json();
    if(data.error){ab.textContent=`错误：${data.error.message}`;ab.style.color='var(--error)';histories[advisorId].pop();}
    else{const reply=data.content?.[0]?.text||'（失败）';histories[advisorId].push({role:'assistant',content:reply});ab.textContent=reply;ab.scrollIntoView({behavior:'smooth',block:'nearest'});}
  }catch(e){ab.textContent='网络错误，请重试。';ab.style.color='var(--error)';histories[advisorId].pop();}
  btn.disabled=false;inputEl.focus();
}

async function getSynthesis(){
  const q=document.getElementById('question').value.trim();
  let opinions='';
  document.querySelectorAll('.result-card').forEach(c=>{
    const adv=ADVISORS.find(a=>a.id===c.dataset.advisorId);
    if(adv)opinions+=`【${adv.name}】\n${c.querySelector('.result-body')?.textContent||''}\n\n`;
  });
  const btn=document.getElementById('synth-btn'),resultEl=document.getElementById('synth-result');
  btn.disabled=true;btn.textContent='生成中…';
  resultEl.innerHTML='<div class="loading-wave"><span></span><span></span><span></span></div>';
  try{
    const resp=await fetch('/api/chat',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system:'你是一位综合各家思想的智慧裁决者。综合多位导师的建议，提炼出共同点与分歧，给出平衡而实际的决策参考。语言清晰有力，200字以内。',
        messages:[{role:'user',content:`决策问题："${q}"\n\n各导师建议：\n${opinions}\n\n请综合以上建议，给出你的裁决。`}]})});
    const data=await resp.json();
    resultEl.textContent=data.content?.[0]?.text||'（生成失败）';
  }catch(e){resultEl.textContent='网络错误，请重试。';}
  btn.disabled=false;btn.textContent='重新生成';
}

function buildSummaryPrompt(){
  const q=document.getElementById('question').value.trim();
  let transcript='';
  document.querySelectorAll('.result-card').forEach(card=>{
    const adv=ADVISORS.find(a=>a.id===card.dataset.advisorId);if(!adv)return;
    transcript+='\n【'+adv.name+'】初始建议：\n'+(card.querySelector('.result-body')?.textContent?.trim()||'')+'\n';
    card.querySelectorAll('.chat-bubble').forEach(b=>{
      if(b.classList.contains('user'))transcript+='\n  用户追问：'+b.textContent.trim()+'\n';
      else transcript+='  '+adv.name+'回答：'+b.textContent.trim()+'\n';
    });
  });
  return `你是一位专业的决策分析整理员。请将以下决策咨询会话整理成一份结构清晰的HTML总结报告。\n\n原始问题：${q}\n导师建议全文：${transcript}\n\n请用HTML格式输出（只输出内容HTML，不要html/head/body标签），必须包含：\n1. 用 <div class="highlight"> 一句话概括核心困境\n2. 用 <h2> + <table> 展示各导师核心观点对比：导师 | 核心观点 | 行动建议 | 标签（用 <span class="tag tag-agree">共识</span> 或 <span class="tag tag-differ">分歧</span>）\n3. <h2>共识与分歧</h2> + <ul>\n4. <h2>需要进一步思考的问题</h2> + <ul> 3-5个\n5. <h2>行动清单</h2> + <ul> 每条前加 <span class="tag tag-action">行动</span>\n6. <h2>导师团最终裁决</h2> + <div class="highlight">\n只输出纯HTML，语言用中文。`;
}

async function openSummary(){
  const modal=document.getElementById('summary-modal'),body=document.getElementById('summary-body');
  modal.style.display='block';body.innerHTML='<div class="loading-wave" style="padding:20px 0"><span></span><span></span><span></span></div>';
  try{
    const resp=await fetch('/api/chat',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:[{role:'user',content:buildSummaryPrompt()}]})});
    const data=await resp.json();
    if(data.error){body.textContent='错误：'+data.error.message;return;}
    let html=data.content?.[0]?.text||'（生成失败）';
    html=html.replace(/```html?/g,'').replace(/```/g,'').trim();
    body.innerHTML=html;
  }catch(e){body.textContent='网络错误，请重试。';}
}
function closeSummary(){document.getElementById('summary-modal').style.display='none';}
function copySummary(){
  navigator.clipboard.writeText(document.getElementById('summary-body').innerText).then(()=>{
    const btn=document.querySelector('.summary-copy-btn');btn.textContent='已复制 ✓';
    setTimeout(()=>btn.textContent='复制内容',1800);
  });
}
function showSummaryTrigger(){
  const el=document.getElementById('summary-trigger');el.style.display='block';
  el.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function toggleGuide(){
  const hints=document.getElementById('guide-hints'),btn=document.getElementById('guide-toggle');
  if(hints.style.display==='none'){hints.style.display='grid';btn.textContent='收起提示';}
  else{hints.style.display='none';btn.textContent='展开提示';}
}
function insertHint(text){
  const ta=document.getElementById('question'),val=ta.value;
  ta.value=(val&&!val.endsWith('\n'))?val+'\n'+text:val+text;
  ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);updateCharCount(ta);
}
function updateCharCount(ta){const el=document.getElementById('char-count');if(el)el.textContent=ta.value.length+' 字';}

let currentTest=null,currentQ=0,testAnswers=[];

function renderTests(){
  document.getElementById('tests-grid').innerHTML=TESTS.map(t=>`
    <div class="test-card ${currentTest?.id===t.id?'active':''}" onclick="startTest('${t.id}')">
      <div class="test-card-glyph">${TEST_GLYPHS[t.id]||''}</div>
      <div class="test-name">${t.name}</div>
      <div class="test-desc">${t.desc}</div>
      <div class="test-meta">${t.time} · ${t.questions.length} 题</div>
    </div>`).join('');
}

function startTest(id){
  currentTest=TESTS.find(t=>t.id===id);currentQ=0;testAnswers=[];
  renderTests();renderTestQuestion();
  const area=document.getElementById('test-area');
  area.classList.add('visible');area.scrollIntoView({behavior:'smooth',block:'start'});
}

function renderTestQuestion(){
  const area=document.getElementById('test-area');
  const t=currentTest,q=t.questions[currentQ],total=t.questions.length;
  const pct=Math.round((currentQ/total)*100);
  area.innerHTML=`
    <div class="test-area-title">${t.name}</div>
    <div class="test-area-sub">${t.desc}</div>
    <div class="test-progress-bar"><div class="test-progress-fill" style="width:${pct}%"></div></div>
    <div class="test-q-label">问题 ${currentQ+1} / ${total}</div>
    <div class="test-question">${q.q}</div>
    <div class="test-options">
      ${q.opts.map((o,i)=>`<button class="test-option ${testAnswers[currentQ]===i?'selected':''}" onclick="selectOption(${i})">${o}</button>`).join('')}
    </div>
    <div class="test-nav">
      ${currentQ>0?'<button class="test-btn-back" onclick="prevQ()">上一题</button>':''}
      <button class="test-btn-next" id="next-btn" onclick="nextQ()" ${testAnswers[currentQ]===undefined?'disabled':''}>
        ${currentQ===total-1?'查看结果':'下一题'}
      </button>
      <span class="test-q-counter">${testAnswers.filter(x=>x!==undefined).length}/${total} 已回答</span>
    </div>`;
}

function selectOption(i){
  testAnswers[currentQ]=i;
  document.querySelectorAll('.test-option').forEach((b,j)=>b.classList.toggle('selected',j===i));
  document.getElementById('next-btn').disabled=false;
}
function nextQ(){if(testAnswers[currentQ]===undefined)return;if(currentQ<currentTest.questions.length-1){currentQ++;renderTestQuestion();}else showTestResult();}
function prevQ(){if(currentQ>0){currentQ--;renderTestQuestion();}}

function showTestResult(){
  const result=currentTest.scoring(testAnswers);
  const area=document.getElementById('test-area');
  area.innerHTML=`
    <div class="test-area-title">${currentTest.name} · 结果</div>
    <div class="test-result visible">
      <div class="test-result-title">${result.name}</div>
      <div class="test-result-tags">${result.tags.map(t=>`<span class="result-tag">${t}</span>`).join('')}</div>
      <div class="test-result-body">${result.body}</div>
    </div>
    <div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;">
      <button class="test-restart-btn" onclick="startTest('${currentTest.id}')">重新测试</button>
      <button class="test-restart-btn" onclick="currentTest=null;renderTests();document.getElementById('test-area').classList.remove('visible')">选其他测试</button>
      <button class="ai-analyze-btn" onclick="aiAnalyzeResult('${result.name}','${currentTest.name}')">AI 深度解读</button>
    </div>
    <div class="ai-analysis-result" id="ai-result"></div>`;
}

async function aiAnalyzeResult(resultName,testName){
  const el=document.getElementById('ai-result');el.classList.add('visible');
  el.innerHTML='<div class="loading-wave"><span></span><span></span><span></span></div>';
  try{
    const resp=await fetch('/api/chat',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:[{role:'user',content:`用户完成了"${testName}"，结果是"${resultName}"。请给出深度解读，包括：这种特质在人生决策中的优势、潜在的盲点、以及3条具体的成长建议。语言温暖直接，200字以内。`}]})});
    const data=await resp.json();
    el.textContent=data.content?.[0]?.text||'（生成失败）';
  }catch(e){el.textContent='网络错误，请重试。';}
}

  renderAdvisors();renderTests();
}
